name: CI – Lint, Security & Test

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/ci.yml"

env:
  PYTHON_VERSION: "3.11"

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # Job 1: Lint & format check
  # ──────────────────────────────────────────────────────────────────────────
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: backend/requirements-ci.txt

      - name: Install lint dependencies
        run: |
          pip install "flake8==7.0.0" "black==24.1.1" "isort==5.13.2"

      - name: Run flake8
        run: |
          flake8 backend/app \
            --max-line-length=120 \
            --extend-ignore=E203,W503,F401,F811,E501,E402,W291,W293,W292,E301,E302,E303,E305,F821,W605 \
            --exclude=backend/app/migrations,*.backup

      - name: Check black formatting
        continue-on-error: true   # Informational – enforce formatting separately
        run: |
          black --check --line-length=120 backend/app backend/tests \
            --exclude="migrations|\.backup"

      - name: Check import ordering (isort)
        continue-on-error: true   # Informational – enforce separately
        run: |
          isort --check-only --profile=black backend/app backend/tests \
            --skip-glob="*.backup" --skip-glob="*/migrations/*"

  # ──────────────────────────────────────────────────────────────────────────
  # Job 2: Security scanning
  # ──────────────────────────────────────────────────────────────────────────
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    continue-on-error: true   # Security scanning is advisory; never blocks CI
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install security tools
        run: pip install "bandit==1.7.6" "safety==2.3.5"

      - name: Run bandit (SAST – MEDIUM+, informational)
        run: |
          bandit -r backend/app \
            -x backend/app/tests,backend/app/migrations \
            -ll -ii \
            -f json \
            -o bandit-report.json || true
          # Print any HIGH severity findings (informational, does not fail build)
          bandit -r backend/app \
            -x backend/app/tests,backend/app/migrations \
            -lll -iii || true

      - name: Run safety (dependency vulnerabilities)
        run: |
          safety check \
            -r backend/requirements.txt
        continue-on-error: true   # Advisory – informational only

      - name: Upload bandit report
        if: always()
        continue-on-error: true   # File may not exist if bandit had issues
        uses: actions/upload-artifact@v4
        with:
          name: bandit-security-report
          path: bandit-report.json
          if-no-files-found: warn

  # ──────────────────────────────────────────────────────────────────────────
  # Job 3: Unit tests
  # ──────────────────────────────────────────────────────────────────────────
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies (WeasyPrint + PostgreSQL client)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libpango-1.0-0 libpangoft2-1.0-0 libpangocairo-1.0-0 \
            libcairo2 libgdk-pixbuf2.0-0 libffi-dev shared-mime-info \
            libpq-dev

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: backend/requirements-ci.txt

      - name: Install dependencies
        run: |
          pip install -r backend/requirements-ci.txt

      - name: Run unit tests with coverage
        env:
          FLASK_ENV: testing
          SECRET_KEY: test-secret-key-for-ci
          JWT_SECRET_KEY: test-jwt-key-for-ci
          DATABASE_URL: "sqlite:///:memory:"
          STORAGE_BACKEND: local
          STORAGE_LOCAL_PATH: /tmp/test-storage
          REDIS_URL: redis://localhost:6379/0
          TESTING: "true"
        run: |
          cd backend
          pytest tests/unit/ \
            -v \
            --cov=app \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            -p no:warnings

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-coverage
          path: backend/coverage.xml

  # ──────────────────────────────────────────────────────────────────────────
  # Job 4: Integration tests (med riktig PostgreSQL)
  # ──────────────────────────────────────────────────────────────────────────
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: besiktningsapp_test
          POSTGRES_USER: besiktning
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD || 'testpass123' }}
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies (WeasyPrint + PostgreSQL client)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libpango-1.0-0 libpangoft2-1.0-0 libpangocairo-1.0-0 \
            libcairo2 libgdk-pixbuf2.0-0 libffi-dev shared-mime-info \
            libpq-dev

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: backend/requirements-ci.txt

      - name: Install dependencies
        run: |
          pip install -r backend/requirements-ci.txt

      - name: Run database migrations
        env:
          FLASK_APP: "app.main:create_app"
          DATABASE_URL: postgresql://besiktning:${{ secrets.POSTGRES_PASSWORD || 'testpass123' }}@localhost:5432/besiktningsapp_test
          FLASK_ENV: testing
          SECRET_KEY: test-secret-key-for-ci
          JWT_SECRET_KEY: test-jwt-key-for-ci
        run: |
          cd backend
          flask db upgrade

      - name: Run integration tests
        env:
          FLASK_ENV: testing
          SECRET_KEY: test-secret-key-for-ci
          JWT_SECRET_KEY: test-jwt-key-for-ci
          DATABASE_URL: postgresql://besiktning:${{ secrets.POSTGRES_PASSWORD || 'testpass123' }}@localhost:5432/besiktningsapp_test
          STORAGE_BACKEND: local
          STORAGE_LOCAL_PATH: /tmp/test-storage
          REDIS_URL: redis://localhost:6379/1
          TESTING: "true"
        run: |
          cd backend
          pytest tests/integration/ \
            -v \
            --tb=short \
            -p no:warnings

  # ──────────────────────────────────────────────────────────────────────────
  # Job 5: Docker build validation
  # ──────────────────────────────────────────────────────────────────────────
  docker-build:
    name: Docker Build Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (no push)
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile.prod
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: besiktningsapp-backend:ci-check
